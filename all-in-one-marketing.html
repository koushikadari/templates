  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n          <a href=\"#\" style=\"border:1px solid var(--accentInk);color:var(--accentInk);font-weight:600;font-size:14.5px;padding:15px 20px;border-radius:14px;text-align:center;\">LinkedIn<\u002Fa>\n          <a href=\"#\" style=\"border:1px solid var(--accentInk);color:var(--accentInk);font-weight:600;font-size:14.5px;padding:15px 20px;border-radius:14px;text-align:center;\">Resume PDF<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:var(--bg);border-top:1px solid var(--border);\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:30px 28px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;\">\n      <span style=\"font-size:13px;color:var(--muted);\">© 2026 {{ p.name }}<\u002Fspan>\n      <span style=\"display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);font-family:var(--fmono);\">\n        <span style=\"width:16px;height:16px;border-radius:5px;background:linear-gradient(135deg,#CBFF3D,#7CE0FF);display:inline-block;\"><\u002Fspan>\n        Made with Portfolio.ai\n      <\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { theme: 'midnight', sub: 'brand' };\n\n  themeVars() {\n    return {\n      midnight: {\n        '--bg':'#0A0A0C','--surface':'#131318','--surface2':'#1C1C24','--border':'#2A2A35','--cardbg':'#131318',\n        '--text':'#F4F4F7','--muted':'#8B8B99','--faint':'#5A5A66',\n        '--accent':'#CBFF3D','--accentInk':'#0A0A0C','--accentSoft':'rgba(203,255,61,0.13)',\n        '--fdisp':\"'Space Grotesk', sans-serif\",'--fbody':\"'Archivo', sans-serif\",'--fmono':\"'Space Mono', monospace\",\n        '--radius':'18px','--dispWeight':'700','--dispTrack':'-0.02em'\n      },\n      daylight: {\n        '--bg':'#FBFBF8','--surface':'#FFFFFF','--surface2':'#EFEFEA','--border':'#E4E4DC','--cardbg':'#FFFFFF',\n        '--text':'#0B0B0D','--muted':'#67676F','--faint':'#A2A29A',\n        '--accent':'#FF3B1F','--accentInk':'#FFFFFF','--accentSoft':'rgba(255,59,31,0.10)',\n        '--fdisp':\"'Archivo', sans-serif\",'--fbody':\"'Archivo', sans-serif\",'--fmono':\"'Space Mono', monospace\",\n        '--radius':'16px','--dispWeight':'800','--dispTrack':'-0.035em'\n      },\n      editorial: {\n        '--bg':'#F2ECE1','--surface':'#FBF7EF','--surface2':'#E9E1D2','--border':'#DBD1BF','--cardbg':'#FBF7EF',\n        '--text':'#1A1612','--muted':'#7C7060','--faint':'#A89A85',\n        '--accent':'#CC4427','--accentInk':'#FBF7EF','--accentSoft':'rgba(204,68,39,0.10)',\n        '--fdisp':\"'DM Serif Display', serif\",'--fbody':\"'Spline Sans', sans-serif\",'--fmono':\"'Space Mono', monospace\",\n        '--radius':'8px','--dispWeight':'400','--dispTrack':'-0.005em'\n      }\n    };\n  }\n\n  pillStyle(active) {\n    return { padding:'6px 13px', borderRadius:'999px', border:'none', cursor:'pointer', fontSize:'12.5px',\n      fontWeight:'600', fontFamily:\"'Archivo', sans-serif\", background: active ? '#F4F4F7' : 'transparent',\n      color: active ? '#0C0C10' : '#9A9AA6', transition:'all .15s', whiteSpace:'nowrap' };\n  }\n  swatchStyle(color, active) {\n    return { width:'24px', height:'24px', borderRadius:'7px', cursor:'pointer', background:color, padding:'0',\n      border: active ? '2px solid #fff' : '2px solid #2A2A33',\n      boxShadow: active ? '0 0 0 2px #0C0C10, 0 0 0 3px '+color : 'none', transition:'all .15s' };\n  }\n\n  DATA() {\n    return {\n      brand: {\n        role:'Brand Marketing Lead',\n        tagline:'I build brands\\npeople remember.',\n        summary:'10 years shaping brand platforms for consumer companies \\u2014 from positioning and identity to the campaigns that make them famous. I turn fuzzy brand strategy into work that moves awareness, sentiment, and sales.',\n        hero:[{v:'+38%',l:'Aided awareness'},{v:'2.4x',l:'Share of voice'},{v:'$4.2M',l:'Earned media'}],\n        metricsTitle:'Brand impact at a glance',\n        metricsSub:'Outcomes across the last six brand platforms I led end to end.',\n        metrics:[\n          {v:'+38%',l:'Aided brand awareness',d:'YoY'},\n          {v:'+27pt',l:'Brand sentiment',d:'net positive'},\n          {v:'24%',l:'Share of voice',d:'+11pt vs cat.'},\n          {v:'$4.2M',l:'Earned media value',d:'per launch'},\n          {v:'+19%',l:'Purchase consideration',d:'lift'},\n          {v:'72',l:'Brand NPS',d:'+14'}\n        ],\n        dash:{title:'Brand health funnel',sub:'Movement across the brand funnel after the \\u201CMade to Last\\u201D platform launch.',rowHead:'Stage',colHeads:['Pre','Post','Lift'],barHead:'Index',rows:[\n          {name:'Awareness',cols:['54%','81%','+27'],bar:81},\n          {name:'Familiarity',cols:['38%','63%','+25'],bar:63},\n          {name:'Consideration',cols:['22%','41%','+19'],bar:41},\n          {name:'Preference',cols:['14%','29%','+15'],bar:29},\n          {name:'Loyalty',cols:['9%','21%','+12'],bar:21}\n        ]},\n        showcaseTitle:'Campaign showcase',\n        showcaseSub:'Brand platforms and integrated campaigns that built fame.',\n        campaigns:[\n          {tag:'Brand platform',title:'Made to Last',desc:'Repositioned a 40-year-old brand around durability. Full identity, film, and OOH.',stat:'+38%',statLabel:'awareness',art:'linear-gradient(135deg,#1D2B64,#F8CDDA)'},\n          {tag:'Integrated',title:'Hometown Heroes',desc:'Community-led brand campaign across social, retail, and local press.',stat:'182M',statLabel:'impressions',art:'linear-gradient(135deg,#FF5E3A,#FF2A68)'},\n          {tag:'Rebrand',title:'Northwind Rebrand',desc:'Name, identity, and go-to-market for a B2B spinout.',stat:'2.4x',statLabel:'share of voice',art:'linear-gradient(135deg,#11998E,#38EF7D)'},\n          {tag:'Launch',title:'Series Zero',desc:'Product launch film and influencer brand seeding.',stat:'$4.2M',statLabel:'earned media',art:'linear-gradient(135deg,#7A18FF,#22D1EE)'}\n        ],\n        showInsights:true,\n        insightsTitle:'Consumer insights',\n        insightsSub:'The research that shaped the work \\u2014 not after it.',\n        insights:[\n          {stat:'63%',text:'of lapsed customers cited \\u201Cit doesn\\u2019t feel like us anymore\\u201D \\u2014 the wedge for the durability platform.'},\n          {stat:'3\\u21921',text:'fragmented segments consolidated into one hero audience after 40 in-depth interviews.'},\n          {stat:'+19%',text:'consideration lift when messaging led with craft over price in concept testing.'}\n        ],\n        playbooksTitle:'How I build brands',\n        playbooks:[\n          {n:'01',title:'Brand strategy sprint',desc:'Positioning, audience, and a message house in three weeks, validated with research.'},\n          {n:'02',title:'Identity \\u2192 campaign',desc:'A repeatable bridge from brand book to in-market creative that stays on-strategy.'},\n          {n:'03',title:'Brand health tracking',desc:'Quarterly funnel and sentiment dashboards leadership actually reads and acts on.'}\n        ],\n        toolsTitle:'Tools & platforms',\n        tools:['Figma','Brandwatch','Qualtrics','YouGov','Meltwater','Notion','Adobe CC','GA4'],\n        caseStudy:{client:'Northwind',year:'2024',role:'Brand lead',tags:['Rebrand','GTM','Identity'],\n          title:'Rebranding a 40-year-old category leader without losing its base',\n          problem:'Northwind was seen as reliable but dated. Growth had flatlined and younger buyers simply didn\\u2019t consider it.',\n          approach:['Re-rooted the brand in \\u201Cengineered to outlast,\\u201D validated across 40 interviews','Rebuilt identity, voice, and a modular campaign system','Sequenced the launch: employees \\u2192 loyalists \\u2192 broad market'],\n          results:[{v:'+38%',l:'Awareness'},{v:'+19%',l:'Consideration'},{v:'2.4x',l:'Share of voice'},{v:'$4.2M',l:'Earned media'}],\n          quote:'\\u201CThe rebrand didn\\u2019t just look better \\u2014 it moved every number on the brand funnel.\\u201D',quoteBy:'VP Marketing, Northwind'},\n        ctaTitle:'Let\\u2019s build a brand people remember.',\n        sectionsConfigured:['Hero','Brand metrics','Brand health funnel','Campaign showcase','Case study','Consumer insights','Playbooks','Tools','Contact']\n      },\n\n      growth: {\n        role:'Growth Marketing Lead',\n        tagline:'I turn funnels into\\ncompounding growth.',\n        summary:'I run growth as a system: acquisition, activation, retention, and referral wired into experiments that compound. 240+ tests shipped, with the winners turned into permanent loops the whole company can rely on.',\n        hero:[{v:'+52%',l:'Activation rate'},{v:'4.3x',l:'LTV / CAC'},{v:'240',l:'Experiments run'}],\n        metricsTitle:'Growth, measured honestly',\n        metricsSub:'The numbers I move \\u2014 tied to retention and revenue, not vanity.',\n        metrics:[\n          {v:'41%',l:'Activation rate',d:'+52%'},\n          {v:'+31%',l:'90-day retention',d:'YoY'},\n          {v:'4.3x',l:'LTV / CAC',d:'+1.6x'},\n          {v:'8.4%',l:'Signup \\u2192 paid',d:'+3.1pt'},\n          {v:'1.2M',l:'Monthly actives',d:'+44%'},\n          {v:'18/mo',l:'Experiment velocity',d:'+6'}\n        ],\n        dash:{title:'Activation funnel',sub:'Where users drop, and what we shipped to fix it.',rowHead:'Step',colHeads:['Users','Conv.','\\u0394'],barHead:'Volume',rows:[\n          {name:'Visit',cols:['100%','\\u2014','\\u2014'],bar:100},\n          {name:'Signup',cols:['64%','24%','+5pt'],bar:64},\n          {name:'Activate',cols:['41%','41%','+52%'],bar:41},\n          {name:'Retain (D30)',cols:['31%','31%','+9pt'],bar:31},\n          {name:'Refer',cols:['18%','12%','+7pt'],bar:18}\n        ]},\n        showcaseTitle:'Growth experiments',\n        showcaseSub:'The highest-leverage tests, turned into permanent loops.',\n        campaigns:[\n          {tag:'Onboarding',title:'Aha in 90 seconds',desc:'Rebuilt activation around a single first-value moment.',stat:'+52%',statLabel:'activation',art:'linear-gradient(135deg,#0F2027,#2C5364)'},\n          {tag:'Referral loop',title:'Give-get v3',desc:'Two-sided incentive that paid for itself in 11 days.',stat:'+7pt',statLabel:'referral rate',art:'linear-gradient(135deg,#F12711,#F5AF19)'},\n          {tag:'Lifecycle',title:'Win-back engine',desc:'Behavioral triggers quietly reactivating dormant users.',stat:'+18%',statLabel:'reactivation',art:'linear-gradient(135deg,#8E2DE2,#4A00E0)'},\n          {tag:'Pricing',title:'Paywall test matrix',desc:'17 paywall variants \\u2192 a permanent lift on paid conversion.',stat:'+3.1pt',statLabel:'paid conv.',art:'linear-gradient(135deg,#11998E,#38EF7D)'}\n        ],\n        showInsights:true,\n        insightsTitle:'Experiment insights',\n        insightsSub:'What the data kept telling us, test after test.',\n        insights:[\n          {stat:'80/20',text:'80% of activation lift came from one onboarding step. We deleted most of the rest.'},\n          {stat:'11 days',text:'payback on the referral loop \\u2014 fast enough to scale paid spend aggressively behind it.'},\n          {stat:'1 metric',text:'tying the whole team to D30 retention beat optimizing six disconnected vanity metrics.'}\n        ],\n        playbooksTitle:'How I run growth',\n        playbooks:[\n          {n:'01',title:'Growth model',desc:'A single equation the whole team optimizes against, updated weekly.'},\n          {n:'02',title:'Experiment system',desc:'Hypothesis \\u2192 test \\u2192 ship-or-kill in disciplined two-week cycles.'},\n          {n:'03',title:'Loop design',desc:'Turning one-off wins into self-reinforcing acquisition and retention loops.'}\n        ],\n        toolsTitle:'Tools & platforms',\n        tools:['Amplitude','Mixpanel','Segment','Braze','Optimizely','dbt','Looker','Webflow'],\n        caseStudy:{client:'Lumen',year:'2024',role:'Head of Growth',tags:['Activation','Retention','Loops'],\n          title:'Doubling activation by deleting most of the onboarding',\n          problem:'A bloated nine-step onboarding buried the product\\u2019s first value. Activation sat stuck at 27%.',\n          approach:['Instrumented the funnel and found the one step that predicted retention','Cut onboarding to three steps centered on that moment','Wrapped the winners into lifecycle and referral loops'],\n          results:[{v:'+52%',l:'Activation'},{v:'+31%',l:'D90 retention'},{v:'4.3x',l:'LTV/CAC'},{v:'+44%',l:'MAU'}],\n          quote:'\\u201CShe found the one step that mattered and had the discipline to cut everything else.\\u201D',quoteBy:'CEO, Lumen'},\n        ctaTitle:'Let\\u2019s find your next growth loop.',\n        sectionsConfigured:['Hero','Growth metrics','Activation funnel','Experiments','Case study','Experiment insights','Playbooks','Tools','Contact']\n      },\n\n      performance: {\n        role:'Performance Marketing Lead',\n        tagline:'I make every dollar\\nof spend accountable.',\n        summary:'Full-funnel paid across search, social, and programmatic. I\\u2019ve managed $48M in spend at a blended 6.2x ROAS \\u2014 building the measurement, creative testing, and bidding systems that let spend scale without the efficiency cliff.',\n        hero:[{v:'6.2x',l:'Blended ROAS'},{v:'-34%',l:'CAC'},{v:'$48M',l:'Spend managed'}],\n        metricsTitle:'Every dollar, accounted for',\n        metricsSub:'Trailing-twelve-month performance across all paid channels.',\n        metrics:[\n          {v:'6.2x',l:'Blended ROAS',d:'+1.8x'},\n          {v:'-34%',l:'Customer acq. cost',d:'YoY'},\n          {v:'$18',l:'Average CPA',d:'-41%'},\n          {v:'3.1%',l:'Blended CTR',d:'+0.9pt'},\n          {v:'+44%',l:'Conversion rate',d:'lift'},\n          {v:'$48M',l:'Annual spend',d:'managed'}\n        ],\n        dash:{title:'Channel performance',sub:'Trailing 90 days across the active paid mix.',rowHead:'Channel',colHeads:['Spend','ROAS','CAC'],barHead:'Efficiency',rows:[\n          {name:'Google Search',cols:['$1.1M','7.4x','$13'],bar:96},\n          {name:'Meta',cols:['$1.4M','6.8x','$16'],bar:88},\n          {name:'TikTok',cols:['$620K','5.1x','$22'],bar:66},\n          {name:'YouTube',cols:['$480K','4.2x','$27'],bar:54},\n          {name:'Programmatic',cols:['$390K','3.6x','$31'],bar:47}\n        ]},\n        showcaseTitle:'Top performing creative',\n        showcaseSub:'Winning concepts that scaled past $250K in spend.',\n        campaigns:[\n          {tag:'Meta \\u00B7 UGC',title:'Founder POV series',desc:'Raw founder UGC that beat studio ads 3:1 on ROAS.',stat:'7.1x',statLabel:'ROAS',art:'linear-gradient(135deg,#FF512F,#DD2476)'},\n          {tag:'Search',title:'Intent conquesting',desc:'Restructured accounts around tight intent clusters.',stat:'$13',statLabel:'CPA',art:'linear-gradient(135deg,#2193B0,#6DD5ED)'},\n          {tag:'TikTok',title:'Hook testing engine',desc:'48 hooks a week, auto-scaling only the top three.',stat:'+44%',statLabel:'CVR',art:'linear-gradient(135deg,#EE7752,#E73C7E)'},\n          {tag:'Retargeting',title:'Predicted-value bidding',desc:'Bid to predicted LTV, not last-click revenue.',stat:'-34%',statLabel:'CAC',art:'linear-gradient(135deg,#434343,#000000)'}\n        ],\n        showInsights:false,\n        insightsTitle:'Creative testing',\n        insightsSub:'',\n        insights:[],\n        playbooksTitle:'How I scale spend',\n        playbooks:[\n          {n:'01',title:'Measurement stack',desc:'MMM + incrementality + platform, triangulated \\u2014 never trusted blindly.'},\n          {n:'02',title:'Creative testing system',desc:'Modular hooks, bodies, and CTAs tested at real volume every week.'},\n          {n:'03',title:'Profitable scaling',desc:'Spend rules tied to marginal ROAS, not the flattering blended number.'}\n        ],\n        toolsTitle:'Tools & platforms',\n        tools:['M
